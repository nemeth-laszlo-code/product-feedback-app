<main
  class="flex max-w-[1440px] mx-auto lg:gap-7.5 lg:mt-[56px] xl:mt-[94px] flex-col xl:flex-row lg:px-10"
>
  <section class="xl:flex-1/5">
    <app-side-bar></app-side-bar>
  </section>
  <section class="flex-1 xl:flex-4/5">
    <app-header></app-header>
    <div class="lg:space-y-5 mt-8 lg:mt-6">
      @for (suggestion of store.suggestions(); track suggestion.id) {
        <app-card-suggestion [suggestionItem]="suggestion" class="block"></app-card-suggestion>
      } @empty {
        <div
          class="mt-8 mx-6 lg:mx-0 lg:mt-6 py-[76px] px-6 lg:py-[110px] bg-ghost-white rounded-[10px] select-none flex flex-col items-center"
        >
          <img src="suggestions/illustration-empty.svg" alt="empty logo" title="empty logo" />
          <h2 class="text-h2 mt-[53px]">There is no Feedback yet.</h2>
          <p class="text-body-1 mt-4 text-navy-muted">
            Got a suggestion? Found a bug that needs to be squashed? We love hearing about new ideas
            to improve our app.
          </p>
          <button appButton variant="purple" class="mt-[46px]" routerLink="/new-feedback">
            + Add Feedback
          </button>
        </div>
      }
    </div>
  </section>
</main>
